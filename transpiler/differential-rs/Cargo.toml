# chomp-differential: the differential gate between the generated Rust engine
# and the TypeScript oracle (itself validated against Solidity).
# Golden vectors live in fixtures/ (generated by transpiler/scripts/
# generate_rust_vectors.ts from the TS transpiled libs, then checked in so
# `cargo test` needs no bun/solc at run time).
[package]
name = "chomp-differential"
version = "0.1.0"
edition = "2021"

[dependencies]
chomp-engine = { path = "../engine" }
chomp-rt = { path = "../runtime" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
