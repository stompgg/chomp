[profile.default]
solc_version = '0.8.34'
src = 'src'
out = 'out'
libs = ['lib']
optimizer = true
optimizer_runs = 4294967295
# @see {@link https://github.com/foundry-rs/foundry/issues/4060}
auto_detect_remappings = false
bytecode_hash = "none"
cbor_metadata = false
sparse_mode = false
build_info = true
via_ir = true
ignored_error_codes = ["unused-param"]

[lint]
exclude_lints = ["unsafe-typecast", "unaliased-plain-import", "mixed-case-variable", "mixed-case-function", "asm-keccak256", "pascal-case-struct", "screaming-snake-case-immutable", "incorrect-shift", "named-struct-fields"]

[profile.default.optimizer_details]
constantOptimizer = true
yul = true

[profile.default.optimizer_details.yulDetails]
stackAllocation = true

[fmt]
sort_imports = true
# forge 1.5.x's formatter DROPS THE BRACES of one-line multi-statement if bodies under the
# default/preserve/single modes ("if (c) { a; break; }" -> unconditional break). "multi" is
# the one mode whose rewrite is brace-correct — verified on if+break / if+else / for shapes.
single_line_statement_blocks = "multi"